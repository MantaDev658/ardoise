app = "ardoise-api"
primary_region = "iad"

[build]
  dockerfile = "apps/backend/Dockerfile"

[env]
  PORT = "8080"
  AUTH_PROVIDER = "clerk"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
