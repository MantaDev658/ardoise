# fly.toml app configuration file generated for ardoise on 2026-06-11T19:54:14Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ardoise'
primary_region = 'sjc'

[build]
  dockerfile = 'apps/backend/Dockerfile'

[env]
  AUTH_PROVIDER = 'clerk'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '5s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
